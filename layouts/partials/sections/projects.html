{{ $sectionID := replace (lower .section.name) " " "-" }}
{{ if .section.id }}
{{ $sectionID = .section.id }}
{{ end }}

<div class="container-fluid anchor pb-5 projects-section">
    <div class="container">
    <h1 class="section-heading-page">
        <span id="{{ $sectionID }}"></span>{{ .section.name }}
    </h1>
    </div>
    <div class="container">
        <div class="projects-grid" id="project-card-holder">
            {{ range .projects }}
            {{ partial "cards/project" . }}
            {{ end }}
        </div>
    </div>
</div>
