# Optional extra lines below the copyright strip (markdown allowed).
footerNotes:
  - "Views expressed here are my own and do not represent my employer, university, or clients."

# A disclaimer notice for the footer. Enable with params.footer.disclaimer.enable if you use it.
disclaimer: ""

# Meta description for your site.  This will help the search engines to find your site.
description: Personal website of Aviral Agarwal.

# specify the list of custom menus that you want to show in the top navbar.
# they will be separated by a divider from the main menus.
customMenus:
- name: Docs
  url: https://toha-guides.netlify.app/posts/
  # specify whether to hide the menu item from top navbar or not.
  hideFromNavbar: true
  # specify whether to show the menu item in footer or not.
  # if you set it to true, make sure you have set `footer.navigation.customMenus: true` in your config.yaml
  showOnFooter: false

# Specify OpenGraph Headers
openGraph:
  title: Aviral Agarwal
  type: website
  description: Personal website of Aviral Agarwal.
  image: images/author/aviral.jpeg
  url: https://www.github.com/aviral-ag
