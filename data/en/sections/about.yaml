# a summary about you
summary: 'Environmental engineer by training, data person by obsession. I work at the overlap of water infrastructure, climate finance, and geospatial AI, turning messy data into decisions people can act on. Some days that''s program management, most days it''s a SQL query, a Python pipeline, or a dashboard. Outside work: chess, tennis, and a new and humbling attempt at crochet. I''ll also spend hours optimizing a flight route to save fifteen dollars, which tells you everything about how my brain works.'

